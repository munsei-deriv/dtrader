<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authenticating…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e10; color: #f0f0f0;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      background: #16161a; border: 1px solid #242428;
      border-radius: 18px; padding: 48px 40px;
      width: 100%; max-width: 360px; text-align: center;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #242428; border-top-color: #ff444f;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 13px; color: #666; }
    .error-icon { font-size: 36px; margin-bottom: 16px; }
    .btn {
      display: inline-block; margin-top: 24px; padding: 10px 24px;
      background: #ff444f; color: #fff; border-radius: 8px;
      font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h2>Completing sign-in…</h2>
    <p>Exchanging authorization code for access token.</p>
  </div>

  <script src="auth.js"></script>
  <script>
    handleCallback()
      .then(() => { window.location.href = 'dashboard.html'; })
      .catch(e => {
        const isCors = e.message.startsWith('CORS_BLOCKED');
        document.getElementById('card').innerHTML = isCors ? `
          <div class="error-icon">🔒</div>
          <h2>Backend proxy required</h2>
          <p style="margin-bottom:12px">
            Deriv's token endpoint blocks direct browser requests (CORS).
            The OAuth flow needs a small server-side proxy to complete.
          </p>
          <p style="font-size:12px;color:#888;margin-bottom:8px">
            <strong>Quick fix:</strong> Deploy a Cloudflare Worker at<br>
            <code style="color:#aaa">POST /token-proxy</code> that forwards the token exchange to
            <code style="color:#aaa">auth.deriv.com</code>, then update
            <code style="color:#aaa">CONFIG.tokenEndpoint</code> in auth.js.
          </p>
          <a href="index.html" class="btn">Back to login</a>
        ` : `
          <div class="error-icon">⚠️</div>
          <h2>Authentication failed</h2>
          <p>${e.message}</p>
          <a href="index.html" class="btn">Back to login</a>
        `;
      });
  </script>
</body>
</html>
